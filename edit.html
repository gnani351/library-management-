<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
</head>

<body>

    <h2>Edit Book</h2>

    <form action="/update/{{ book[0] }}" method="POST">

        <input type="text"
               name="title"
               value="{{ book[1] }}"
               required>

        <input type="text"
               name="author"
               value="{{ book[2] }}"
               required>

        <input type="number"
               name="quantity"
               value="{{ book[3] }}"
               required>

        <button type="submit">
            Update Book
        </button>

    </form>

</body>
</html>
